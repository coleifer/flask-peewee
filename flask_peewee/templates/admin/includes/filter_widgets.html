  <div class="card card-body mb-3 d-none" id="filter-wrapper">
    <div class="d-none" id="filter-fields">
      {% for field in filter_form %}
        {{ field() }}
      {% endfor %}
    </div>
    <form action="." class="modeladmin-filters" method="get">
      {% if ordering %}<input type="hidden" name="ordering" value="{{ ordering }}" />{% endif %}
      <div class="d-flex align-items-start">
        <div class="filter-list flex-grow-1"></div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary btn-sm" type="submit">Apply</button>
          <a class="btn btn-secondary btn-sm" href=".">Reset</a>
        </div>
      </div>
    </form>
  </div>
