<nav aria-label="pagination">
  <ul class="pagination">
    {% if query.get_page() > 1 %}
      <li class="page-item"><a class="page-link" href="./?{{ admin.update_querystring(request.query_string, 'page', query.get_page() - 1) }}">Previous</a></li>
    {% else %}
      <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
    {% endif %}
    {% if query.get_pages() > query.get_page() %}
      <li class="page-item"><a class="page-link" href="./?{{ admin.update_querystring(request.query_string, 'page', query.get_page() + 1) }}">Next</a></li>
    {% else %}
      <li class="page-item disabled"><a class="page-link" href="#">Next</a></li>
    {% endif %}
  </ul>
</nav>
